name: Android APK & AAB Derleyici

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Android Derlemesi
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Klonla (Checkout)
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Bağımlılıkları Yükle (npm install)
        run: npm install

      - name: Web Uygulamasını Derle (React Build)
        run: npm run build

      - name: Java 21 Kurulumu (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Capacitor Android Projesini Hazırla
        run: |
          if [ -d "android" ]; then
            if [ ! -f "android/gradlew" ]; then
              echo "WARNING: 'android' folder exists but is incomplete (missing gradlew). Recreating..."
              rm -rf android
              npx cap add android
            else
              echo "Android folder is complete."
            fi
          else
            echo "Android folder does not exist. Adding android platform..."
            npx cap add android
          fi
          
          npx cap sync android
          chmod +x android/gradlew

      - name: Debug APK Derle (Telefon için)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Google Play için Release AAB Derle
        run: |
          cd android
          ./gradlew bundleRelease

      - name: APK Dosyasını Yükle (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: KelimeSavasi-Mobil-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: AAB Dosyasını Yükle (Google Play Bundle)
        uses: actions/upload-artifact@v4
        with:
          name: KelimeSavasi-PlayStore-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
